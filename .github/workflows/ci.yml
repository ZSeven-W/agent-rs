name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: cargo test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  msrv:
    name: msrv (1.80)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.80
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features

  features:
    name: feature combinations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `agent` crate features
      - run: cargo check -p agent --no-default-features
      - run: cargo check -p agent --no-default-features --features anthropic
      - run: cargo check -p agent --no-default-features --features openai
      - run: cargo check -p agent --no-default-features --features ollama
      - run: cargo check -p agent --no-default-features --features mcp
      - run: cargo check -p agent --no-default-features --features session-jsonl
      - run: cargo check -p agent --no-default-features --features swarm
      - run: cargo check -p agent --no-default-features --features full
      # `agent-tools-code` companion features — make sure each pack
      # builds in isolation so a host that only opts into `shell` or
      # `web` doesn't get tripped by some other feature's deps.
      - run: cargo check -p agent-tools-code --no-default-features
      - run: cargo check -p agent-tools-code --no-default-features --features fs
      - run: cargo check -p agent-tools-code --no-default-features --features search
      - run: cargo check -p agent-tools-code --no-default-features --features shell
      - run: cargo check -p agent-tools-code --no-default-features --features web
      - run: cargo check -p agent-tools-code --no-default-features --features web-search
      - run: cargo check -p agent-tools-code --no-default-features --features todo
      - run: cargo check -p agent-tools-code --no-default-features --features notebook
      - run: cargo check -p agent-tools-code --no-default-features --features all

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
