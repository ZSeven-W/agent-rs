[graph]
all-features = false

[advisories]
db-path = "$CARGO_HOME/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",  # webpki-root-certs (transitive via reqwest/rustls)
]
confidence-threshold = 0.93

# ollama-rs 0.3.4 ships without a `license` field in Cargo.toml — only a
# `[no-license-field]` warning, not a deny error. Treating as known-MIT
# per upstream LICENSE file in the repo. Re-evaluate when 0.4 ships.

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
